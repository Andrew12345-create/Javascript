<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="project.css" />
</head>
<body>
    <header>
        <h1>TaskMaster Pro</h1>
    </header>

    <main>
        <section id="taskSection">
            <input type="text" id="taskInput" placeholder="Enter a new task..." />
            <button id="addTask">Add Task</button>
            <ul id="taskList"></ul>
            <p id="taskCount">You have 0 task(s) remaining.</p> <!-- Task count added here -->
        </section>

        <section id="quoteSection">
            <h2>Chuck Norris Quote</h2>
            <p id="quoteDisplay">"A fresh roundhouse kick of inspiration will appear here."</p>
            <button id="newQuote">Get New Quote</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 TaskMaster Pro. All rights reserved.</p>
    </footer>

    <script src="project.js"></script>
</body>
</html>
